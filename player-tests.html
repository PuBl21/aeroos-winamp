<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AeroOS Player — Tests</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #b0b0b0;
    font-family: 'Courier New', monospace;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    color: #00ff88;
    font-size: 1.4em;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #555;
    font-size: 0.85em;
    margin-bottom: 24px;
  }
  .suite {
    margin-bottom: 18px;
    border-left: 2px solid #222;
    padding-left: 14px;
  }
  .suite-title {
    color: #7b8cff;
    font-weight: bold;
    font-size: 1.05em;
    margin-bottom: 4px;
  }
  .test {
    padding: 3px 0;
    font-size: 0.92em;
  }
  .pass { color: #33ff33; }
  .pass::before { content: '  ✓ '; }
  .fail { color: #ff4444; }
  .fail::before { content: '  ✗ '; }
  .fail-detail {
    color: #ff6666;
    padding-left: 32px;
    font-size: 0.85em;
    margin-bottom: 2px;
  }
  .summary {
    margin-top: 28px;
    padding: 14px 18px;
    border: 1px solid #333;
    border-radius: 4px;
    font-size: 1.1em;
    display: flex;
    gap: 24px;
  }
  .summary.all-pass { border-color: #33ff33; color: #33ff33; }
  .summary.has-fail { border-color: #ff4444; color: #ff4444; }
  .stat-pass { color: #33ff33; }
  .stat-fail { color: #ff4444; }
  .stat-total { color: #b0b0b0; }
  .duration { color: #555; margin-left: 8px; font-size: 0.85em; }
</style>
</head>
<body>

<!-- Mock DOM elements required by player.js -->
<div id="mockDOM" style="display:none">
  <audio id="audioPlayer"></audio>
  <video id="bgVideo"></video>
  <span id="timeMinutes"></span>
  <span id="timeSeconds"></span>
  <span id="trackTitle"></span>
  <span id="trackMarquee"></span>
  <span id="metaKbps"></span>
  <span id="metaKhz"></span>
  <span id="metaStereo"></span>
  <div id="seekBar"><div id="seekFill"></div><div id="seekThumb"></div></div>
  <div id="volumeBar"><div id="volumeFill"></div><div id="volumeThumb"></div></div>
  <button id="prevBtn"></button>
  <button id="rewindBtn"></button>
  <button id="playBtn"></button>
  <button id="pauseBtn"></button>
  <button id="stopBtn"></button>
  <button id="forwardBtn"></button>
  <button id="nextBtn"></button>
  <button id="shuffleBtn"></button>
  <button id="repeatBtn"></button>
  <div id="playlistBody"></div>
  <span id="playlistCount"></span>
  <span id="playlistTotalTime"></span>
  <span id="playlistTotalTracks"></span>
</div>

<h1>AeroOS City Ambient Player — Tests</h1>
<div class="subtitle">player.js unit tests</div>
<div id="results"></div>

<script src="player.js"></script>
<script>
(function () {
  'use strict';

  const t0 = performance.now();
  const resultsEl = document.getElementById('results');
  let totalPass = 0;
  let totalFail = 0;
  let currentSuite = null;

  // ── Mini Test Framework ──────────────────────────────────

  function describe(name, fn) {
    const suite = document.createElement('div');
    suite.className = 'suite';
    const title = document.createElement('div');
    title.className = 'suite-title';
    title.textContent = name;
    suite.appendChild(title);
    resultsEl.appendChild(suite);
    currentSuite = suite;
    fn();
    currentSuite = null;
  }

  function it(name, fn) {
    const div = document.createElement('div');
    div.className = 'test';
    try {
      fn();
      div.classList.add('pass');
      div.textContent = name;
      totalPass++;
    } catch (e) {
      div.classList.add('fail');
      div.textContent = name;
      totalFail++;
      const detail = document.createElement('div');
      detail.className = 'fail-detail';
      detail.textContent = e.message;
      currentSuite.appendChild(div);
      currentSuite.appendChild(detail);
      return;
    }
    currentSuite.appendChild(div);
  }

  function assertEqual(actual, expected, label) {
    if (actual !== expected) {
      throw new Error((label ? label + ': ' : '') +
        'expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
    }
  }

  function assertTrue(value, label) {
    if (value !== true) {
      throw new Error((label || 'assertTrue') + ': expected true, got ' + JSON.stringify(value));
    }
  }

  function assertFalse(value, label) {
    if (value !== false) {
      throw new Error((label || 'assertFalse') + ': expected false, got ' + JSON.stringify(value));
    }
  }

  function assertType(value, type, label) {
    if (typeof value !== type) {
      throw new Error((label || 'assertType') + ': expected type ' + type + ', got ' + typeof value);
    }
  }

  // ── Helpers ──────────────────────────────────────────────

  function resetState() {
    State.currentTrack = 0;
    State.isPlaying = false;
    State.isShuffle = false;
    State.repeatMode = 'none';
    State.volume = 0.75;
    State.isSeeking = false;
    State.isVolumeChanging = false;
  }

  function withMockedHour(hour, fn) {
    const OrigDate = Date;
    window.Date = function () { return new OrigDate(2026, 2, 30, hour, 0, 0); };
    window.Date.prototype = OrigDate.prototype;
    window.Date.now = OrigDate.now;
    try { fn(); } finally { window.Date = OrigDate; }
  }

  // ── Tests ────────────────────────────────────────────────

  // 1. updateTimeDisplay
  describe('updateTimeDisplay()', function () {
    it('0 секунд → "00:00"', function () {
      updateTimeDisplay(0);
      assertEqual(DOM.timeMinutes.textContent, '00');
      assertEqual(DOM.timeSeconds.textContent, '00');
    });

    it('65 секунд → "01:05"', function () {
      updateTimeDisplay(65);
      assertEqual(DOM.timeMinutes.textContent, '01');
      assertEqual(DOM.timeSeconds.textContent, '05');
    });

    it('59 секунд → "00:59"', function () {
      updateTimeDisplay(59);
      assertEqual(DOM.timeMinutes.textContent, '00');
      assertEqual(DOM.timeSeconds.textContent, '59');
    });

    it('3599 секунд → "59:59"', function () {
      updateTimeDisplay(3599);
      assertEqual(DOM.timeMinutes.textContent, '59');
      assertEqual(DOM.timeSeconds.textContent, '59');
    });

    it('дробное значение 92.7 → "01:32" (floor)', function () {
      updateTimeDisplay(92.7);
      assertEqual(DOM.timeMinutes.textContent, '01');
      assertEqual(DOM.timeSeconds.textContent, '32');
    });

    it('120 секунд → "02:00"', function () {
      updateTimeDisplay(120);
      assertEqual(DOM.timeMinutes.textContent, '02');
      assertEqual(DOM.timeSeconds.textContent, '00');
    });
  });

  // 2. PLAYLIST
  describe('PLAYLIST — структура массива', function () {
    it('PLAYLIST не пуст', function () {
      assertTrue(PLAYLIST.length > 0, 'length > 0');
    });

    it('каждый трек имеет поле title (string)', function () {
      PLAYLIST.forEach(function (track, i) {
        assertType(track.title, 'string', 'track[' + i + '].title');
        assertTrue(track.title.length > 0, 'track[' + i + '].title not empty');
      });
    });

    it('каждый трек имеет поле file (string)', function () {
      PLAYLIST.forEach(function (track, i) {
        assertType(track.file, 'string', 'track[' + i + '].file');
        assertTrue(track.file.length > 0, 'track[' + i + '].file not empty');
      });
    });

    it('каждый трек имеет поле duration (string, формат M:SS)', function () {
      var re = /^\d+:\d{2}$/;
      PLAYLIST.forEach(function (track, i) {
        assertType(track.duration, 'string', 'track[' + i + '].duration type');
        assertTrue(re.test(track.duration), 'track[' + i + '].duration format: ' + track.duration);
      });
    });

    it('файлы треков имеют расширение .mp3', function () {
      PLAYLIST.forEach(function (track, i) {
        assertTrue(track.file.endsWith('.mp3'), 'track[' + i + '].file ends with .mp3');
      });
    });
  });

  // 3. State — начальные значения
  describe('State — начальные значения', function () {
    resetState();

    it('isPlaying === false', function () {
      assertFalse(State.isPlaying);
    });

    it('isShuffle === false', function () {
      assertFalse(State.isShuffle);
    });

    it('repeatMode === "none"', function () {
      assertEqual(State.repeatMode, 'none');
    });

    it('volume === 0.75', function () {
      assertEqual(State.volume, 0.75);
    });

    it('currentTrack === 0', function () {
      assertEqual(State.currentTrack, 0);
    });

    it('isSeeking === false', function () {
      assertFalse(State.isSeeking);
    });

    it('isVolumeChanging === false', function () {
      assertFalse(State.isVolumeChanging);
    });
  });

  // 4. toggleShuffle
  describe('toggleShuffle()', function () {
    it('false → true при первом вызове', function () {
      resetState();
      toggleShuffle();
      assertTrue(State.isShuffle);
    });

    it('true → false при повторном вызове', function () {
      resetState();
      toggleShuffle();
      toggleShuffle();
      assertFalse(State.isShuffle);
    });

    it('три переключения → true', function () {
      resetState();
      toggleShuffle();
      toggleShuffle();
      toggleShuffle();
      assertTrue(State.isShuffle);
    });
  });

  // 5. toggleRepeat
  describe('toggleRepeat()', function () {
    it('none → all', function () {
      resetState();
      toggleRepeat();
      assertEqual(State.repeatMode, 'all');
    });

    it('all → one', function () {
      resetState();
      toggleRepeat();
      toggleRepeat();
      assertEqual(State.repeatMode, 'one');
    });

    it('one → none (полный цикл)', function () {
      resetState();
      toggleRepeat();
      toggleRepeat();
      toggleRepeat();
      assertEqual(State.repeatMode, 'none');
    });

    it('двойной цикл: 6 вызовов → none', function () {
      resetState();
      for (var i = 0; i < 6; i++) toggleRepeat();
      assertEqual(State.repeatMode, 'none');
    });

    it('кнопка показывает 🔂 при mode=one', function () {
      resetState();
      toggleRepeat();
      toggleRepeat();
      assertEqual(State.repeatMode, 'one');
      assertEqual(DOM.repeatBtn.textContent, '🔂');
    });

    it('кнопка показывает 🔁 при mode=all', function () {
      resetState();
      toggleRepeat();
      assertEqual(State.repeatMode, 'all');
      assertEqual(DOM.repeatBtn.textContent, '🔁');
    });
  });

  // 6. updateTimeOfDayBackground
  describe('updateTimeOfDayBackground()', function () {
    it('час 7 → sunrise', function () {
      withMockedHour(7, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'sunrise');
      });
    });

    it('час 6 → sunrise (граница)', function () {
      withMockedHour(6, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'sunrise');
      });
    });

    it('час 9 → sunrise', function () {
      withMockedHour(9, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'sunrise');
      });
    });

    it('час 10 → day (граница)', function () {
      withMockedHour(10, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'day');
      });
    });

    it('час 12 → day', function () {
      withMockedHour(12, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'day');
      });
    });

    it('час 16 → day', function () {
      withMockedHour(16, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'day');
      });
    });

    it('час 17 → sunset (граница)', function () {
      withMockedHour(17, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'sunset');
      });
    });

    it('час 19 → sunset', function () {
      withMockedHour(19, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'sunset');
      });
    });

    it('час 21 → night (граница)', function () {
      withMockedHour(21, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'night');
      });
    });

    it('час 0 → night (полночь)', function () {
      withMockedHour(0, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'night');
      });
    });

    it('час 3 → night', function () {
      withMockedHour(3, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'night');
      });
    });

    it('час 5 → night (до sunrise)', function () {
      withMockedHour(5, function () {
        updateTimeOfDayBackground();
        assertEqual(document.body.dataset.timeOfDay, 'night');
      });
    });
  });

  // 7. setVolume
  describe('setVolume()', function () {
    it('setVolume(0) → State.volume === 0', function () {
      setVolume(0);
      assertEqual(State.volume, 0);
      assertEqual(DOM.audioPlayer.volume, 0);
    });

    it('setVolume(1) → State.volume === 1', function () {
      setVolume(1);
      assertEqual(State.volume, 1);
      assertEqual(DOM.audioPlayer.volume, 1);
    });

    it('setVolume(0.5) → State.volume === 0.5', function () {
      setVolume(0.5);
      assertEqual(State.volume, 0.5);
      assertEqual(DOM.audioPlayer.volume, 0.5);
    });

    it('setVolume(0.75) → значение по умолчанию', function () {
      setVolume(0.75);
      assertEqual(State.volume, 0.75);
    });

    it('setVolume(0) → volumeFill.width === "0%"', function () {
      setVolume(0);
      assertEqual(DOM.volumeFill.style.width, '0%');
    });

    it('setVolume(1) → volumeFill.width === "100%"', function () {
      setVolume(1);
      assertEqual(DOM.volumeFill.style.width, '100%');
    });

    it('setVolume(0.5) → volumeFill.width === "50%"', function () {
      setVolume(0.5);
      assertEqual(DOM.volumeFill.style.width, '50%');
    });

    it('значения > 1 вызывают ошибку audio элемента', function () {
      var threw = false;
      try { setVolume(1.5); } catch (e) { threw = true; }
      assertTrue(threw, 'audio.volume > 1 throws');
    });

    it('значения < 0 вызывают ошибку audio элемента', function () {
      var threw = false;
      try { setVolume(-0.5); } catch (e) { threw = true; }
      assertTrue(threw, 'audio.volume < 0 throws');
    });
  });

  // ── Summary ──────────────────────────────────────────────

  var elapsed = (performance.now() - t0).toFixed(1);
  var total = totalPass + totalFail;
  var summary = document.createElement('div');
  summary.className = 'summary ' + (totalFail === 0 ? 'all-pass' : 'has-fail');
  summary.innerHTML =
    '<span class="stat-pass">' + totalPass + ' passed</span>' +
    '<span class="stat-fail">' + totalFail + ' failed</span>' +
    '<span class="stat-total">' + total + ' total</span>' +
    '<span class="duration">' + elapsed + ' ms</span>';
  resultsEl.appendChild(summary);

  resetState();
  setVolume(State.volume);
})();
</script>
</body>
</html>
